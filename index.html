<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Interactive WebAR Test</title>

  <!-- Stable WebAR and Rendering Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      touch-action: none;
    }

    #controls {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 999;
      display: none;
    }

    button {
      padding: 12px 18px;
      margin-right: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="controls">
  <button id="dissectBtn">Dissect</button>
  <button id="resetBtn" style="display:none;">Reset</button>
</div>

<a-scene 
  mindar-image="imageTargetSrc: ./assets/tracking-files/targets.mind; filterMinCF: 0.001; filterBeta: 1000;" 
  color-space="sRGB" 
  renderer="colorManagement: true, physicallyCorrectLights" 
  vr-mode-ui="enabled: false" 
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <a-asset-item id="modelAsset0" src="./assets/models/0.glb"></a-asset-item>
  </a-assets>

  <a-camera 
    position="0 0 0" 
    look-controls="enabled:false" 
    camera="near:0.01; far:10000;">
  </a-camera>

  <a-entity id="target0" mindar-image-target="targetIndex:0">
    <!-- Touch interactions alter this wrapper node globally -->
    <a-entity id="wrapper0" class="interactive-model" rotation="0 0 0" scale="1 1 1">
      <a-gltf-model
        id="model0"
        src="#modelAsset0"
        position="0 0 0.1"
        rotation="0 0 0"
        animation-mixer>
      </a-gltf-model>
    </a-entity>
  </a-entity>

</a-scene>

<script>
let activeModel = null;
let model = null;

let isTracking = false;
let isDragging = false;

let previousTouchX = 0;
let previousTouchY = 0;

let initialPinchDistance = 0;
let initialScale = 1;

// Calibrated specific to direct Three.js engine radian conversion structures
const rotationSpeed = 0.007; 
const scaleMin = 0.1;
const scaleMax = 5.0;

let animationMixer = null;
let animationAction = null;

const controls = document.getElementById("controls");
const dissectBtn = document.getElementById("dissectBtn");
const resetBtn = document.getElementById("resetBtn");

function getPinchDistance(touch1, touch2) {
  const dx = touch1.clientX - touch2.clientX;
  const dy = touch1.clientY - touch2.clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

// All initialization logic isolated safely until the DOM finishes booting
window.addEventListener("load", () => {
  activeModel = document.getElementById("wrapper0");
  model = document.getElementById("model0");
  const target = document.getElementById("target0");

  target.addEventListener("targetFound", () => {
    isTracking = true;
    controls.style.display = "block";
    dissectBtn.style.display = "inline-block";
    resetBtn.style.display = "none";
    resetAnimation();
  });

  target.addEventListener("targetLost", () => {
    isTracking = false;
    isDragging = false;
    controls.style.display = "none";
    stopAnimation();
  });

  // FIXED: Moved listener internally to prevent crashing when 'model' is null
  model.addEventListener("gltf-model-loaded", (e) => {
    // Extract internal Three.js animation arrays accurately from direct payload
    const modelObject = e.detail.model;
    if (model.components["animation-mixer"]) {
      animationMixer = model.components["animation-mixer"].mixer;
      
      // Wait a frame cycle to make sure animation data arrays map into the mixer context
      setTimeout(() => {
        if (animationMixer && animationMixer._actions && animationMixer._actions.length > 0) {
          animationAction = animationMixer._actions[0];
        }
      }, 50);
    }
  });

  dissectBtn.addEventListener("click", () => {
    playAnimation();
    dissectBtn.style.display = "none";
    resetBtn.style.display = "inline-block";
  });

  resetBtn.addEventListener("click", () => {
    resetAnimation();
    dissectBtn.style.display = "inline-block";
    resetBtn.style.display = "none";
  });
});

// Touch controls window listeners
window.addEventListener("touchstart", (e) => {
  if (!isTracking || !activeModel) return;

  if (e.touches.length === 1) {
    isDragging = true;
    previousTouchX = e.touches[0].clientX;
    previousTouchY = e.touches[0].clientY;
  }
  else if (e.touches.length === 2) {
    isDragging = false; // Kill rotation lock immediately
    initialPinchDistance = getPinchDistance(e.touches[0], e.touches[1]);
    initialScale = activeModel.object3D.scale.x; 
  }
});

window.addEventListener("touchmove", (e) => {
  if (!isTracking || !activeModel) return;
  e.preventDefault();

  // One finger rotation (Smooth Three.js direct matrix pass manipulation)
  if (e.touches.length === 1 && isDragging) {
    const currentX = e.touches[0].clientX;
    const currentY = e.touches[0].clientY;

    const deltaX = currentX - previousTouchX;
    const deltaY = currentY - previousTouchY;

    previousTouchX = currentX;
    previousTouchY = currentY;

    // Apply rotations smoothly direct to Three.js coordinates
    activeModel.object3D.rotation.y += deltaX * rotationSpeed;
    
    let newRotationX = activeModel.object3D.rotation.x - (deltaY * rotationSpeed);
    // Radians constraint equivalent to your original -90 to 90 degrees threshold check
    activeModel.object3D.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, newRotationX));
  }
  // Two finger pinch scaling mode
  else if (e.touches.length === 2) {
    const currentDistance = getPinchDistance(e.touches[0], e.touches[1]);
    if (initialPinchDistance === 0) return;

    let newScale = initialScale * (currentDistance / initialPinchDistance);
    newScale = Math.max(scaleMin, Math.min(newScale, scaleMax));

    activeModel.object3D.scale.set(newScale, newScale, newScale);
  }
}, { passive: false });

window.addEventListener("touchend", (e) => {
  if (!isTracking) return;

  if (e.touches.length === 0) {
    isDragging = false;
  }
  else if (e.touches.length === 1) {
    isDragging = true; // Seamless finger lift fallback handoff
    previousTouchX = e.touches[0].clientX;
    previousTouchY = e.touches[0].clientY;
  }
});

function playAnimation() {
  if (!animationAction) return;
  animationAction.reset();
  animationAction.setLoop(THREE.LoopOnce);
  animationAction.clampWhenFinished = true;
  animationAction.paused = false;
  animationAction.timeScale = 1;
  animationAction.play();
}

function resetAnimation() {
  if (!animationAction) return;
  animationAction.stop();
  animationAction.reset();
  animationAction.timeScale = 1;
  animationAction.play();
  animationAction.paused = true;
}

function stopAnimation() {
  if (!animationAction) return;
  animationAction.stop();
}
</script>

</body>
</html>
